<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Fall</title>
    <style>
        :root {
            --neon: #0f0;
            --bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.1s ease-out;
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .flash-effect {
            background-color: var(--neon);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 3;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--neon);
            letter-spacing: 4px;
        }

        #game-wrapper {
            display: flex;
            gap: 20px;
            z-index: 3;
            position: relative;
        }

        canvas {
            background-color: #000;
            border: 2px solid var(--neon);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        #ui-panel {
            display: flex;
            flex-direction: column;
            width: 120px;
        }

        .terminal-box {
            border: 1px solid var(--neon);
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(0, 20, 0, 0.8);
        }

        .terminal-box p {
            margin: 0 0 5px 0;
            font-size: 0.8rem;
            border-bottom: 1px dashed var(--neon);
            padding-bottom: 5px;
        }

        .val {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        /* Overlay */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(2px);
        }

        button {
            background: #000;
            color: var(--neon);
            border: 1px solid var(--neon);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
            box-shadow: 0 0 5px var(--neon);
            transition: all 0.2s;
        }

        button:hover {
            background: var(--neon);
            color: #000;
        }

        /* Mobile Controls */
        #mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            z-index: 3;
        }

        .m-btn {
            padding: 15px;
            font-size: 1.2rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            #game-wrapper { flex-direction: column; align-items: center; gap: 10px; }
            #ui-panel { flex-direction: row; width: 240px; justify-content: space-between; margin-bottom: 0; }
            .terminal-box { margin-bottom: 0; flex: 1; margin: 0 5px; }
            #next-piece-container { display: none; } /* Hide preview on small screens to save space */
            #mobile-controls { display: grid; }
            canvas#tetris { width: 240px; height: 480px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>> MATRIX_FALL</h1>
        <small>SYS.INIT // READY</small>
    </header>

    <div id="game-wrapper">
        <canvas id="tetris" width="240" height="480"></canvas>
        
        <div id="ui-panel">
            <div class="terminal-box" id="next-piece-container">
                <p>NEXT_OBJ</p>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <div class="terminal-box">
                <p>SCORE</p>
                <span id="score" class="val">0000</span>
            </div>
            <div class="terminal-box">
                <p>LEVEL</p>
                <span id="level" class="val">01</span>
            </div>
            <div class="terminal-box">
                <p>LINES</p>
                <span id="lines" class="val">00</span>
            </div>
        </div>

        <div id="overlay">
            <h2 id="overlay-msg">> SYSTEM_HALT</h2>
            <button id="start-btn">INITIALIZE</button>
        </div>
    </div>

    <div id="mobile-controls">
        <button class="m-btn" id="btn-left">←</button>
        <button class="m-btn" id="btn-rotate">↻</button>
        <button class="m-btn" id="btn-right">→</button>
        <button class="m-btn" style="grid-column: 1 / span 3;" id="btn-drop">↓ HARD DROP</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');
        const startBtn = document.getElementById('start-btn');
        
        // Scale everything up by 20 for logic, meaning 1 block = 20px
        const BLOCK_SIZE = 20;
        context.scale(BLOCK_SIZE, BLOCK_SIZE);
        nextContext.scale(BLOCK_SIZE, BLOCK_SIZE);

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isPaused = true;
        let animationId;

        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0, level: 1 };
        let nextPiece = null;

        // Matrix Arena setup
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }
        const arena = createMatrix(12, 24);

        // Tetriminos
        const pieces = 'TJLOSZI';
        function createPiece(type) {
            switch(type) {
                case 'T': return [[0,0,0],[1,1,1],[0,1,0]];
                case 'O': return [[2,2],[2,2]];
                case 'L': return [[0,3,0],[0,3,0],[0,3,3]];
                case 'J': return [[0,4,0],[0,4,0],[4,4,0]];
                case 'I': return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
                case 'S': return [[0,6,6],[6,6,0],[0,0,0]];
                case 'Z': return [[7,7,0],[0,7,7],[0,0,0]];
            }
        }

        // Drawing Logic - Neon Terminal Style
        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = '#000';
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Neon Borders
                        ctx.strokeStyle = 'var(--neon)';
                        ctx.lineWidth = 0.1;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Inner "chip" dot
                        ctx.fillStyle = 'var(--neon)';
                        ctx.fillRect(x + offset.x + 0.4, y + offset.y + 0.4, 0.2, 0.2);
                    }
                });
            });
        }

        function drawGhost() {
            const ghost = { matrix: player.matrix, pos: { x: player.pos.x, y: player.pos.y } };
            while (!collide(arena, ghost)) { ghost.pos.y++; }
            ghost.pos.y--;
            
            ghost.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.strokeStyle = 'rgba(0, 255, 0, 0.2)';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + ghost.pos.x, y + ghost.pos.y, 1, 1);
                    }
                });
            });
        }

        function drawNext() {
            // FIX: Ensure piece exists before calculating length
            if (!nextPiece || !nextPiece.matrix) return; 
            
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            const offset = {
                x: 2 - Math.floor(nextPiece.matrix[0].length / 2),
                y: 2 - Math.floor(nextPiece.matrix.length / 2)
            };
            drawMatrix(nextPiece.matrix, offset, nextContext);
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawGhost();
            if(player.matrix) drawMatrix(player.matrix, player.pos, context);
        }

        // Logic
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function triggerFlash() {
            document.body.classList.add('flash-effect');
            setTimeout(() => document.body.classList.remove('flash-effect'), 150);
        }

        function arenaSweep() {
            let rowCount = 1;
            let linesCleared = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 100;
                rowCount *= 2;
                linesCleared++;
            }
            if(linesCleared > 0) {
                player.lines += linesCleared;
                player.level = Math.floor(player.lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
                updateScore();
                triggerFlash(); // Matrix terminal flash!
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) { player.pos.x -= dir; }
        }

        function playerReset() {
            if (!nextPiece) nextPiece = { matrix: createPiece(pieces[Math.floor(Math.random() * pieces.length)]) };
            player.matrix = nextPiece.matrix;
            player.pos.y = 0;
            player.pos.x = Math.floor(arena[0].length / 2) - Math.floor(player.matrix[0].length / 2);
            
            nextPiece = { matrix: createPiece(pieces[Math.floor(Math.random() * pieces.length)]) };
            drawNext();

            if (collide(arena, player)) {
                gameOver();
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) { matrix.forEach(row => row.reverse()); } 
            else { matrix.reverse(); }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); // Undo rotation if kick fails
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score.toString().padStart(4, '0');
            document.getElementById('level').innerText = player.level.toString().padStart(2, '0');
            document.getElementById('lines').innerText = player.lines.toString().padStart(2, '0');
        }

        function update(time = 0) {
            if(isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) { playerDrop(); }
            draw();
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            isPaused = true;
            cancelAnimationFrame(animationId);
            overlay.style.display = 'flex';
            overlayMsg.innerText = "> FATAL_ERROR";
            startBtn.innerText = "REBOOT";
        }

        function startGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.lines = 0;
            player.level = 1;
            dropInterval = 1000;
            updateScore();
            playerReset();
            overlay.style.display = 'none';
            isPaused = false;
            lastTime = performance.now();
            update();
        }

        // Input Setup
        document.addEventListener('keydown', event => {
            if(isPaused) return;
            if (event.keyCode === 37) { playerMove(-1); } // Left
            else if (event.keyCode === 39) { playerMove(1); } // Right
            else if (event.keyCode === 40) { playerDrop(); } // Down
            else if (event.keyCode === 38) { playerRotate(1); } // Up
            else if (event.keyCode === 32) { playerHardDrop(); } // Space
        });

        startBtn.addEventListener('click', startGame);

        // Mobile Controls
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(-1); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); playerMove(1); });
        document.getElementById('btn-rotate').addEventListener('touchstart', (e) => { e.preventDefault(); playerRotate(1); });
        document.getElementById('btn-drop').addEventListener('touchstart', (e) => { e.preventDefault(); playerHardDrop(); });

        drawNext();
    </script>
</body>
</html>
